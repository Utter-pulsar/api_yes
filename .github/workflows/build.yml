name: build

# Push a version tag (e.g. v0.1.0) → builds Windows + macOS (Intel & Apple Silicon) +
# Linux installers in the cloud and publishes them to a GitHub Release for that tag, so
# installed apps can discover + auto-install updates via electron-updater.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # the auto-update feed (latest*.yml) takes its version from package.json, NOT the git
      # tag, so a mismatch would advertise the wrong update version.
      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG=${GITHUB_REF_NAME#v}
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then echo "::error::Tag v$TAG does not match package.json version $PKG"; exit 1; fi

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Build bundles
        run: npm run build

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish never

      - name: Package (macOS — Intel x64 + Apple Silicon arm64)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish never

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: api-yes-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/latest*.yml
            dist/*.blockmap
          if-no-files-found: ignore

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          generate_release_notes: true
